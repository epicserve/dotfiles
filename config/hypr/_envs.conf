# Environment overrides

# Scale SourceGit (Avalonia/XWayland) to match the HiDPI monitor scale.
# Avalonia has no GDK_SCALE equivalent, and Omarchy's defaults set
# `xwayland { force_zero_scaling = true }`, so on a scaled monitor the app
# renders tiny. AVALONIA_GLOBAL_SCALE_FACTOR is the Avalonia analog -- it
# scales the whole app, context menus included, on every launch path and
# survives SourceGit upgrades. Lives here (sourced via
# omarchy_hyprland_overrides.conf) rather than ~/.config/hypr/envs.conf,
# which Hyprland never sources.
env = AVALONIA_GLOBAL_SCALE_FACTOR,1.5
